# IG Imports - API Stack (Backend Node.js)
# Project: ig-imports-api
# Services: Backend API

name: ig-imports-api

services:
  backend:
    container_name: igimports-api
    build:
      context: ../../backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-3001}:3001"
    environment:
      PORT: 3001
      NODE_ENV: production
      DB_HOST: ${DB_HOST:-76.13.171.93}
      DB_PORT: ${DB_PORT:-5432}
      DB_NAME: ${DB_NAME:-igimports_db}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://localhost:3001/health', (r) => r.statusCode === 200 ? process.exit(0) : process.exit(1))"
        ]
      timeout: 5s
      interval: 10s
      retries: 3
    networks:
      - igimports-network

networks:
  igimports-network:
    name: igimports-network
    driver: bridge
    external: true
