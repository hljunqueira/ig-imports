name: Deploy Backend to VPS

on:
  push:
    branches: [ main, master ]
    paths:
      - 'backend/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup SSH
      uses: webfactory/ssh-agent@v0.9.0
      with:
        ssh-private-key: ${{ secrets.VPS_SSH_KEY }}
        
    - name: Add VPS to known hosts
      run: |
        mkdir -p ~/.ssh
        ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts
        
    - name: Sync backend files to VPS
      run: |
        rsync -avz --delete \
          --exclude='node_modules' \
          --exclude='dist' \
          --exclude='.env' \
          --exclude='uploads' \
          ./backend/ \
          ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/opt/ig-imports-api/backend/
        
    - name: Build and restart containers
      run: |
        ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} << 'EOF'
          set -e
          echo "=== Building Docker image ==="
          cd /opt/ig-imports-api/backend
          docker build -t ig-imports-api-backend .
          
          echo "=== Restarting containers ==="
          cd /opt/ig-imports-api
          docker-compose down
          docker-compose up -d
          
          echo "=== Cleaning up old images ==="
          docker image prune -f
          
          echo "=== Status ==="
          docker-compose ps
          echo "=== Deploy completed ==="
        EOF
        
    - name: Health check
      run: |
        echo "Waiting for server to start..."
        sleep 15
        curl -f http://${{ secrets.VPS_HOST }}:3001/health || exit 1
        echo "✅ Health check passed!"
